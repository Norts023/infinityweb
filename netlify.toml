[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Rota limpa para o proxy da IA
[[redirects]]
  from = "/api/chat"
  to   = "/.netlify/functions/groq-proxy"
  status = 200

# Rota para a API do painel administrativo
[[redirects]]
  from = "/api/admin"
  to   = "/.netlify/functions/admin-api"
  status = 200
